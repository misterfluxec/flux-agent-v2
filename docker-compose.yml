# =============================================================================
# FLUXAGENT V2 — DOCKER COMPOSE MAESTRO (v2.2 Production-Ready)
# =============================================================================
# Mejoras: Healthchecks encadenados, límites de recursos i7, Ollama integrado.
# =============================================================================

version: '3.9'

services:
  # --- DATABASE (PostgreSQL + pgvector) ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fluxagent-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-fluxagent_v2}
      POSTGRES_USER: ${DB_USER:-fluxadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fluxsecure2026}
      TZ: America/Guayaquil
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fluxadmin} -d ${DB_NAME:-fluxagent_v2}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - fluxagent-net

  # --- CACHE & QUEUES (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: fluxagent-redis
    restart: always
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:-redisflux2026}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redisflux2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fluxagent-net

  # --- AI ENGINE (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: fluxagent-ollama
    restart: always
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_THREADS=6 # Optimizado para i7
      - OLLAMA_MAX_LOADED_MODELS=3 # Límite de modelos cargados simultáneamente
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # Esperar 60s antes de primer healthcheck
    deploy:
      resources:
        limits:
          memory: 12G # Límite para modelos grandes (qwen2.5)
          cpus: '6' # Límite de CPU para i7 7th gen
        reservations:
          memory: 4G # Memoria mínima garantizada
    networks:
      - fluxagent-net

  # --- BACKEND (FastAPI) ---
  backend:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: fluxagent-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-9000}:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-fluxadmin}:${DB_PASSWORD:-fluxsecure2026}@fluxagent-postgres:5432/${DB_NAME:-fluxagent_v2}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redisflux2026}@fluxagent-redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-cambiar_en_produccion_jwt_secret}
      OLLAMA_BASE_URL: http://fluxagent-ollama:11434
      APP_ENV: ${APP_ENV:-production}
      TZ: America/Guayaquil
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./src:/app
      - ./data/media:/app/data/media
      - ./data/logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '3.0'
    networks:
      - fluxagent-net

  # --- ASYNC WORKER (Dramatiq) ---
  worker:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: fluxagent-worker
    restart: always
    command: python -m dramatiq tasks.async_tasks tasks.followup_worker
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=postgresql+asyncpg://fluxadmin:fluxsecure2026@fluxagent-postgres:5432/fluxagent_v2
      - REDIS_URL=redis://:redisflux2026@fluxagent-redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-12315838b8aaae13b3118409c46f0d5e34de20536ae7039abb83817034edc5b9}
      - DB_NAME=${DB_NAME:-fluxagent_v2}
      - DB_USER=${DB_USER:-fluxadmin}
      - DB_PASSWORD=${DB_PASSWORD:-fluxsecure2026}
      - DB_HOST=fluxagent-postgres
      - DB_PORT=5432
      - REDIS_HOST=fluxagent-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redisflux2026}
      - OLLAMA_URL=http://fluxagent-ollama:11434
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://flux-evolution:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-fluxkey123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import dramatiq; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - fluxagent-net

  # --- FRONTEND (Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fluxagent-web
    restart: always
    command: npm run dev -- -p 4000
    network_mode: host
    user: "0:0"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:9000/api/v1}
      - NODE_ENV=development
    depends_on:
      backend:
        condition: service_healthy

  # --- TTS CLEANUP (Cron) ---
  tts-cleanup:
    build:
      context: .
      dockerfile: Dockerfile.cleanup
    container_name: fluxagent-tts-cleanup
    volumes:
      - ./data/media/tts_cache:/app/data/media/tts_cache
      - ./data/logs:/app/logs
    environment:
      - TTS_CACHE_DIR=/app/data/media/tts_cache
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always
    networks:
      - fluxagent-net

  # --- OBSERVABILITY (Loki, Promtail, Prometheus, Grafana) ---
  loki:
    image: grafana/loki:latest
    container_name: fluxagent-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - fluxagent-net

  promtail:
    image: grafana/promtail:latest
    container_name: fluxagent-promtail
    volumes:
      - ./data/logs:/var/log/fluxagent
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - fluxagent-net
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: fluxagent-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - fluxagent-net

  grafana:
    image: grafana/grafana:latest
    container_name: fluxagent-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=adminflux2026
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - fluxagent-net
    depends_on:
      - loki
      - prometheus

volumes:
  postgres_data:
    name: fluxagent_postgres_data
  redis_data:
    name: fluxagent_redis_data
  ollama_data:
    name: fluxagent_ollama_data
  prometheus_data:
    name: fluxagent_prometheus_data
  grafana_data:
    name: fluxagent_grafana_data

networks:
  fluxagent-net:
    driver: bridge