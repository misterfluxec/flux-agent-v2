# =============================================================================
# FLUXAGENT V2 — PYTEST CONFIGURATION
# =============================================================================
# Configuración para testing con Pytest + TestContainers
# =============================================================================

[tool:pytest]
# Directorios de tests
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Configuración de asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Marcadores personalizados
markers =
    slow: marks tests as slow running
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    unit: marks tests as unit tests
    redis: marks tests that require Redis
    postgres: marks tests that require PostgreSQL
    auth: marks tests that require authentication
    analytics: marks tests for analytics endpoints
    agents: marks tests for agents endpoints
    resilience: marks tests for resilience patterns

# Configuración de salida
addopts = 
    -v
    --strict-markers
    --strict-config
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
    --maxfail=5
    --disable-warnings

# Configuración de coverage
[coverage:run]
source = src
omit = 
    */tests/*
    */conftest.py
    */migrations/*
    */venv/*
    */env/*
    */__pycache__/*
    */.pytest_cache/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Configuración de logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Configuración de timeouts
timeout = 300
timeout_method = thread
